# Render Blueprint (Infrastructure as Code) for the Forth Urban API.
# Docs: https://render.com/docs/blueprint-spec
#
# How to use: in the Render dashboard, "New +" -> "Blueprint" -> connect this
# GitHub repo. Render reads this file and proposes the service below. Actual
# secret VALUES are never stored here (see the `sync: false` env vars) — you
# fill those in via the Render dashboard after the blueprint is created. See
# docs/DEPLOYMENT.md for the full manual walkthrough.
#
# This only provisions the backend. The frontend (apps/client) is deployed
# separately on Vercel (see docs/DEPLOYMENT.md) since Vercel has no
# equivalent blueprint format Render can share.

services:
  - type: web
    name: forth-urban-api
    runtime: node
    plan: free
    region: oregon
    rootDir: apps/server
    # Monorepo build: pnpm workspaces need the install to run from the repo
    # root so workspace:* deps (@forth-urban/shared-types etc.) resolve, then
    # tsc builds this package (and its workspace deps, via project references)
    # into dist/.
    buildCommand: "cd ../.. && corepack enable && pnpm install --frozen-lockfile && pnpm --filter server build"
    startCommand: "node dist/index.js"
    healthCheckPath: /api/health
    autoDeploy: true
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # --- Secrets & per-environment values: set these in the Render
      # dashboard (Environment tab) after the blueprint is created. Never
      # commit real values here. See docs/ENVIRONMENT.md for what each one
      # does and where to obtain it.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.1
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SALES_WHATSAPP_NUMBER
        sync: false
      - key: SALES_NOTIFICATION_EMAIL
        sync: false
      - key: QUIZ_ABANDONMENT_REMINDER_HOURS
        value: 48
      - key: ENABLE_CRON_JOBS
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: SENTRY_DSN
        sync: false
